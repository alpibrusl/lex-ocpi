[package]
name    = "lex-ocpi"
version = "0.1.0"
lex     = "0.9.5"

# OCPI (Open Charge Point Interface) library for lex-lang.
#
# Pairs with:
#   lex-schema  — pydantic-style request validators (path = "../lex-schema")
#   lex-orm     — typed query builder + migration runner; provides
#                 the `Repo[T]` instances and migrations consumed by
#                 `src/repo/*.lex` (see issue #6).
#   lex-web     — FastAPI-style HTTP framework (optional)
#   lex-ocpp    — companion OCPP library (CP↔CSMS over WebSocket)
#
# v0.1 ships the OCPI 2.2.1 surface (Locations, Sessions, CDRs,
# Tokens, Tariffs, Commands, Credentials, Versions). 2.1.1 and 2.3.0
# slot in as sibling `v211/` / `v230/` directories — the wire
# envelope, status codes, and routing layer are version-agnostic.
[dependencies]
lex-schema = { path = "../lex-schema" }
lex-orm    = { path = "../lex-orm" }
