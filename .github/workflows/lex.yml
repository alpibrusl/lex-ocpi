name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: lex ci --no-fmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      LEX_VERSION: v0.10.4
      LEX_TARGET: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout lex-ocpi
        uses: actions/checkout@v4
        with:
          path: lex-ocpi

      - name: Checkout lex-schema sibling (flat layout)
        uses: actions/checkout@v4
        with:
          repository: alpibrusl/lex-schema
          path: lex-schema

      - name: Checkout lex-orm sibling (flat layout)
        uses: actions/checkout@v4
        with:
          repository: alpibrusl/lex-orm
          path: lex-orm

      - name: Install pre-built lex
        run: |
          set -euo pipefail
          ARCHIVE="lex-${LEX_VERSION}-${LEX_TARGET}.tar.gz"
          curl -sSfL --retry 5 --retry-delay 3 --retry-all-errors \
            "https://github.com/alpibrusl/lex-lang/releases/download/${LEX_VERSION}/${ARCHIVE}" \
            -o "${ARCHIVE}"
          tar -xzf "${ARCHIVE}"
          sudo install -m 0755 "lex-${LEX_VERSION}-${LEX_TARGET}/lex" /usr/local/bin/lex
          lex --version

      - name: Resolve dependencies
        working-directory: lex-ocpi
        run: lex pkg install

      - name: Run `lex ci --no-fmt`
        working-directory: lex-ocpi
        run: lex ci --no-fmt

      - name: Property-test driver
        working-directory: lex-ocpi
        run: lex run --allow-effects random tests/test_property.lex run_all

      - name: Smoke-test the codegen tool
        working-directory: lex-ocpi
        run: |
          cat > /tmp/schema.json <<'EOF'
          {
            "title": "Heartbeat",
            "type": "object",
            "required": ["timestamp"],
            "properties": {
              "timestamp": { "type": "string", "minLength": 1, "maxLength": 32 }
            }
          }
          EOF
          JSON=$(jq -R -s . < /tmp/schema.json)
          lex run tools/gen.lex generate "$JSON" | grep -q 'fn heartbeat_schema'

      - name: Conformance harnesses against the fake CPO + eMSP examples
        working-directory: lex-ocpi
        run: |
          set -uo pipefail
          lex run --allow-effects net,io,time examples/cpo_v221.lex main &
          CPO_PID=$!
          lex run --allow-effects net,io,time,concurrent examples/emsp_v221.lex main &
          EMSP_PID=$!
          lex run --allow-effects net,io,time examples/cpo_buggy.lex main &
          BUGGY_PID=$!
          trap 'kill ${CPO_PID} ${EMSP_PID} ${BUGGY_PID} 2>/dev/null || true' EXIT
          for i in $(seq 1 50); do
            if curl -sf http://localhost:9100/ocpi/versions > /dev/null \
               && curl -sf http://localhost:9101/ocpi/versions > /dev/null \
               && curl -sf http://localhost:9103/ocpi/versions > /dev/null; then
              break
            fi
            sleep 0.1
          done
          # Full v2.2.1 suites + per-version cross-version subsets.
          # `time` is in the allow-list because src/client.lex's retry
          # helpers carry [time] even though the harnesses don't invoke
          # them — lex's effect checker scans every transitively-
          # imported function.
          lex run --allow-effects net,io,time,proc conformance/cpo_harness.lex main
          lex run --allow-effects net,io,time,proc conformance/cpo_harness.lex main_v211
          lex run --allow-effects net,io,time,proc conformance/cpo_harness.lex main_v230
          lex run --allow-effects net,io,time,proc conformance/emsp_harness.lex main
          # Harness self-test: assert the harness catches deliberate
          # spec violations from `examples/cpo_buggy.lex`. A passing
          # selftest proves the harness's assertions actually have
          # teeth — every wrapped case must turn FAIL → PASS via
          # `cc.expect_fail`.
          lex run --allow-effects net,io,time,proc conformance/selftest.lex main
