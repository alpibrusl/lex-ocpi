name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: lex ci --no-fmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      LEX_VERSION: v0.9.5
      LEX_TARGET: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout lex-ocpi
        uses: actions/checkout@v4
        with:
          path: lex-ocpi

      - name: Checkout lex-schema sibling (flat layout)
        uses: actions/checkout@v4
        with:
          repository: alpibrusl/lex-schema
          path: lex-schema

      - name: Checkout lex-orm sibling (flat layout)
        uses: actions/checkout@v4
        with:
          repository: alpibrusl/lex-orm
          path: lex-orm

      - name: Install pre-built lex
        run: |
          set -euo pipefail
          ARCHIVE="lex-${LEX_VERSION}-${LEX_TARGET}.tar.gz"
          # --retry handles transient release-CDN propagation hiccups
          # right after a fresh tag is pushed (we hit one on v0.9.5).
          curl -sSfL --retry 5 --retry-delay 3 --retry-all-errors \
            "https://github.com/alpibrusl/lex-lang/releases/download/${LEX_VERSION}/${ARCHIVE}" \
            -o "${ARCHIVE}"
          tar -xzf "${ARCHIVE}"
          sudo install -m 0755 "lex-${LEX_VERSION}-${LEX_TARGET}/lex" /usr/local/bin/lex
          lex --version

      - name: Resolve dependencies
        working-directory: lex-ocpi
        run: lex pkg install

      - name: Run `lex ci --no-fmt`
        working-directory: lex-ocpi
        run: lex ci --no-fmt

      - name: Property-test driver
        working-directory: lex-ocpi
        run: lex run --allow-effects random tests/test_property.lex run_all

      - name: Smoke-test the codegen tool
        working-directory: lex-ocpi
        run: |
          cat > /tmp/schema.json <<'EOF'
          {
            "title": "Heartbeat",
            "type": "object",
            "required": ["timestamp"],
            "properties": {
              "timestamp": { "type": "string", "minLength": 1, "maxLength": 32 }
            }
          }
          EOF
          JSON=$(jq -R -s . < /tmp/schema.json)
          lex run tools/gen.lex generate "$JSON" | grep -q 'fn heartbeat_schema'

      - name: Conformance harness against the fake CPO example
        working-directory: lex-ocpi
        run: |
          set -euo pipefail
          # Start the fake CPO server in the background.
          lex run --allow-effects net,io,time examples/cpo_v221.lex main &
          SERVER_PID=$!
          # Poll until the server is up (max 5s).
          for i in $(seq 1 50); do
            if curl -sf http://localhost:9100/ocpi/versions > /dev/null; then
              break
            fi
            sleep 0.1
          done
          # Run the conformance harness against it.
          lex run --allow-effects net,io conformance/cpo_harness.lex main
          HARNESS_EXIT=$?
          kill $SERVER_PID 2>/dev/null || true
          exit $HARNESS_EXIT
